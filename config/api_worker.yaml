fastapi:
  user_id_header_name: x-user-id
  request_id_header_name: x-request-id
  process_time_header_name: x-process-time
  process_time_ms_header_name: x-process-time-ms

uvicorn:
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false
  loop: uvloop

nats:
  host: localhost
  port: 4222
  healthcheck_file: /tmp/nats_worker_healthbeat
  loop_sleep_duration: 2
  connect_name: transactions
  reconnect_time_wait: 5
  connect_timeout: 5
  ping_interval: 120
  max_outstanding_pings: 3
  email:
    stream_name: email
    send_subject_name: send

db:
  host: localhost
  port: 5432
  user: transactions_users
  database: transactions_users
  password_file: /tmp/transactions/db_password
  pool:
    min_size: 10
    max_size: 20
    max_inactive_connection_lifetime: 300
    max_connection_lifetime: 3600
    timeout: 20

redis:
  host: localhost
  port: 6379
  db: 0
  password: null
  decode_responses: true
  healthcheck_interval: 30
  socket_timeout: 5
  socket_connect_timeout: 5
